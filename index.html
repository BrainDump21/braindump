<script id="tailwind-config">

    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface": "#f5f0e8",
          "on-surface": "#191c1d",
          "surface-container-low": "#f3f4f5",

          "primary-fixed": "#dde1ff",

<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f5f0e8; color: #191c1d; min-height: 100dvh; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .share-popover { display: none; position: absolute; right: 0; top: 100%; z-index: 100; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border: 1px solid #f0f0f0; min-width: 140px; overflow: hidden; }
  .share-popover.active { display: block; }
  .share-popover button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 16px; font-size: 13px; font-weight: 600; color: #191c1d; background: none; border: none; cursor: pointer; transition: background 0.15s; }
  .share-popover button:hover { background: #f5f0e8; }
  .mic-active { background: #fee2e2 !important; color: #ef4444 !important; animation: pulse-mic 1.5s infinite; }
  @keyframes pulse-mic { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
  .entry-img { max-width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; max-height: 280px; object-fit: cover; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #E8EEFF; color: #2E5BFF; font-size: 10px; font-weight: 700; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.15s; }
  .tag:hover { opacity: 0.8; }
  .tag-followup { background: #ffece6 !important; color: #c24100 !important; }
  mark { background: #fef08a; border-radius: 2px; padding: 0 1px; }
  .drag-over { border-color: #2E5BFF !important; background: #E8EEFF !important; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #191c1d; color: white; padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
</style>

<!-- Header -->
<header class="bg-white border-b border-gray-100 sticky top-[33px] z-50">
  <div class="flex justify-between items-center w-full px-4 py-3 mx-auto max-w-3xl">
    <div class="flex items-center gap-2">
      <div class="bg-[#2E5BFF] p-1 rounded-lg">
        <span class="material-symbols-outlined text-white text-[20px]" style="font-variation-settings:'FILL' 1">psychology</span>
      </div>
      <h1 class="text-xl font-extrabold tracking-tight text-[#191c1d]">BrainDump</h1>
    </div>
    <div class="flex items-center gap-1.5">
      <button onclick="importData()" class="flex items-center gap-1 px-2.5 py-1.5 border border-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-tight text-gray-600 hover:bg-gray-50 transition-colors">
        <span class="material-symbols-outlined text-[14px]">upload</span><span>Import</span>
      </button>
      <button onclick="exportData()" class="flex items-center gap-1 px-2.5 py-1.5 border border-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-tight text-gray-600 hover:bg-gray-50 transition-colors">
        <span class="material-symbols-outlined text-[14px]">download</span><span>Export</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 pb-8 space-y-4 pt-4">

  <!-- Input -->
  <section class="space-y-3">
    <div id="attachZone" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden transition-all">
      <textarea id="noteInput" class="w-full min-h-[140px] p-4 text-base leading-relaxed border-none focus:ring-0 placeholder:text-gray-300 resize-none outline-none" placeholder="Type a quick thought... add #tags to organize. Ctrl+Enter to save."></textarea>
      <div class="flex justify-between items-center px-3 pb-3 gap-2">
        <div id="attachPreview" class="flex flex-wrap gap-2"></div>
        <div class="flex gap-2 ml-auto">
          <button onclick="document.getElementById('fileInput').click()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-gray-50 text-gray-400 hover:bg-gray-100 transition-colors cursor-pointer" title="Attach image">
            <span class="material-symbols-outlined text-[18px]">attachment</span>
          </button>
          <input type="file" id="fileInput" accept="image/*,image/jpeg,image/png,image/gif,image/webp" class="hidden" onchange="handleFileInput(event)"/>
        </div>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button id="saveBtn" onclick="saveEntry()" class="flex items-center gap-1 px-4 py-2.5 bg-[#2E5BFF] text-white font-bold rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-md text-xs">
          <span>Save</span>
        </button>
        <button onclick="clearInput()" class="flex items-center gap-1 px-3 py-2.5 bg-white text-gray-400 font-bold rounded-xl hover:bg-gray-50 active:scale-95 transition-all border border-gray-200 text-xs">
          <span>Delete</span>
        </button>
        <button id="followupBtn" onclick="addFollowUp()" class="flex items-center gap-1 px-3 py-2.5 bg-[#C24100] text-white font-bold rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-md text-xs whitespace-nowrap">
          <span>Follow Up</span>
        </button>
      </div>
      <button id="micBtn" onclick="toggleMic()" class="w-12 h-12 flex items-center justify-center bg-white text-[#2E5BFF] rounded-full shadow-md hover:shadow-lg transition-all active:scale-90 border border-gray-100">
        <span class="material-symbols-outlined text-[24px]">mic</span>
      </button>
    </div>
  </section>

  <!-- Search -->
  <div class="relative">
    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 text-[20px]">search</span>
    <input id="searchInput" oninput="renderEntries()" class="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all text-sm shadow-sm" placeholder="Search your brain..." type="text"/>
  </div>

  <!-- Filter indicator -->
  <div id="filterBar" class="hidden items-center gap-2 px-1">
    <span class="text-[11px] text-gray-400 font-semibold">Filtered by:</span>
    <span id="filterTag" class="tag"></span>
    <button onclick="clearFilter()" class="text-[11px] text-gray-400 hover:text-gray-700 font-bold ml-1">✕ Clear</button>
  </div>

  <!-- Feed -->
  <div id="entriesFeed" class="space-y-3">
    <div class="flex items-center px-1">
      <h2 class="text-[10px] font-extrabold uppercase tracking-[0.15em] text-gray-400">Recent Entries</h2>
    </div>
  </div>

</main>



<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="this.classList.remove('active')">
  <img id="lightboxImg" src="" alt=""/>
</div>

<!-- Hidden import input -->
<input type="file" id="importInput" accept=".json" class="hidden" onchange="handleImport(event)"/>

<script>

const KEY = 'braindump_v1';
let entries = JSON.parse(localStorage.getItem(KEY) || '[]');
let activeFilter = null;
let pendingImage = null;
let recognition = null;
let micActive = false;

function clearInput() {
  document.getElementById('noteInput').value = '';
  pendingImage = null;
  document.getElementById('attachPreview').innerHTML = '';
  document.getElementById('noteInput').focus();
}

function saveEntry() {
  const text = document.getElementById('noteInput').value.trim();
  if (!text && !pendingImage) return;
  entries.unshift({ id: Date.now(), text, image: pendingImage || null, pinned: false, ts: new Date().toISOString() });
  persist();
  document.getElementById('noteInput').value = '';
  pendingImage = null;
  document.getElementById('attachPreview').innerHTML = '';
  renderEntries();
}

function addFollowUp() {
  const ta = document.getElementById('noteInput');
  if (!ta.value.includes('#followup')) ta.value = ta.value.trim() + (ta.value.trim() ? ' ' : '') + '#followup';
  saveEntry();
}

function persist() { localStorage.setItem(KEY, JSON.stringify(entries)); }

function renderEntries() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const feed = document.getElementById('entriesFeed');
  let filtered = entries.filter(e => {
    const ms = !search || e.text.toLowerCase().includes(search);
    const mf = !activeFilter || e.text.toLowerCase().includes(activeFilter.toLowerCase());
    return ms && mf;
  });
  filtered.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
  feed.innerHTML = '<div class="flex items-center px-1"><h2 class="text-[10px] font-extrabold uppercase tracking-[0.15em] text-gray-400">Recent Entries</h2></div>';
  if (!filtered.length) {
    feed.innerHTML += '<div class="text-center py-16 text-gray-300"><span class="material-symbols-outlined text-[52px] block mb-3">psychology</span><p class="text-sm font-semibold">No entries yet</p></div>';
    return;
  }
  filtered.forEach(e => feed.insertAdjacentHTML('beforeend', buildCard(e, search)));
}

function buildCard(e, search) {
  const tags = (e.text.match(/#\w+/g) || []);
  const tagHtml = tags.map(t => {
    const isFU = t.toLowerCase() === '#followup';
    const cls = isFU ? 'tag tag-followup' : 'tag';
    const icon = isFU ? '<span class="material-symbols-outlined text-[11px]">flag</span> ' : '';
    return `<span class="${cls}" onclick="filterByTag(this.dataset.tag)" data-tag="${t}">${icon}${t}</span>`;
  }).join('');
  const txt = search ? e.text.replace(new RegExp(`(${esc(search)})`, 'gi'), '<mark>$1</mark>') : e.text;
  const imgHtml = e.image ? `<img src="${e.image}" class="entry-img" onclick="openLightbox(this.src)" alt=""/>` : '';
  const pinnedBar = e.pinned
    ? `<div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-[15px] text-[#2E5BFF]">push_pin</span><span class="text-[10px] font-bold text-[#2E5BFF] uppercase tracking-tight">Pinned &bull; ${fmtDate(e.ts)}</span></div>`
    : `<span class="text-[10px] font-bold text-gray-300 uppercase tracking-tight">${fmtDate(e.ts)}</span>`;
  const border = e.pinned ? 'border-l-[4px] border-l-[#2E5BFF] border-y border-r border-gray-100' : 'border border-gray-100';
  const pinFill = e.pinned ? '1' : '0';
  const pinColor = e.pinned ? 'text-[#2E5BFF]' : 'text-gray-300 hover:text-gray-600';
  return `<article class="entry-card bg-white p-5 rounded-xl ${border} shadow-sm hover:shadow-md transition-all duration-200" data-id="${e.id}">
    <div class="flex justify-between items-start mb-3">
      ${pinnedBar}
      <div class="flex items-center gap-1 relative ml-2 shrink-0">
        <button onclick="toggleShare(${e.id},this)" class="p-1.5 text-gray-300 hover:text-gray-600 rounded-lg hover:bg-gray-50"><span class="material-symbols-outlined text-[18px]">ios_share</span></button>
        <div class="share-popover" id="share-${e.id}">
          <button onclick="shareEmail(${e.id})"><span class="material-symbols-outlined text-[16px]">mail</span>Email</button>
          <button onclick="shareText(${e.id})"><span class="material-symbols-outlined text-[16px]">sms</span>Text</button>
          <button onclick="shareCopy(${e.id})"><span class="material-symbols-outlined text-[16px]">content_copy</span>Copy</button>
        </div>
        <button onclick="togglePin(${e.id})" class="p-1.5 ${pinColor} rounded-lg hover:bg-gray-50"><span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' ${pinFill}">push_pin</span></button>
        <button onclick="deleteEntry(${e.id})" class="p-1.5 text-gray-300 hover:text-red-400 rounded-lg hover:bg-gray-50"><span class="material-symbols-outlined text-[18px]">delete</span></button>
      </div>
    </div>
    <p class="text-[#191c1d] text-base leading-snug font-medium mb-3">${txt}</p>
    ${imgHtml}
    ${tagHtml ? `<div class="flex flex-wrap gap-2 mt-3">${tagHtml}</div>` : ''}
  </article>`;
}

function togglePin(id) { entries = entries.map(e => e.id===id ? Object.assign({},e,{pinned:!e.pinned}) : e); persist(); renderEntries(); }
function deleteEntry(id) { if (!confirm('Delete this entry?')) return; entries = entries.filter(e => e.id!==id); persist(); renderEntries(); }
function filterByTag(tag) { activeFilter=tag; document.getElementById('filterBar').classList.remove('hidden'); document.getElementById('filterBar').classList.add('flex'); document.getElementById('filterTag').textContent=tag; renderEntries(); }
function clearFilter() { activeFilter=null; document.getElementById('filterBar').classList.add('hidden'); document.getElementById('filterBar').classList.remove('flex'); renderEntries(); }

function toggleShare(id, btn) {
  const pop = document.getElementById('share-'+id);
  const was = pop.classList.contains('active');
  document.querySelectorAll('.share-popover').forEach(p=>p.classList.remove('active'));
  if (!was) pop.classList.add('active');
  event.stopPropagation();
}
document.addEventListener('click', () => document.querySelectorAll('.share-popover').forEach(p=>p.classList.remove('active')));
function getE(id) { return entries.find(e=>e.id===id); }
function shareEmail(id) { const e=getE(id); window.location.href='mailto:?subject=BrainDump Idea&body='+encodeURIComponent(e.text); }
function shareText(id) { const e=getE(id); window.location.href='sms:?body='+encodeURIComponent(e.text); }
function shareCopy(id) { const e=getE(id); navigator.clipboard.writeText(e.text).then(()=>toast('Copied!')); }

function handleFileInput(ev) { const f=ev.target.files[0]; if(f){resize(f); ev.target.value='';} }
function resize(file) {
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      let w=img.width,h=img.height,max=1200;
      if(w>max){h=Math.round(h*max/w);w=max;}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      pendingImage=c.toDataURL('image/jpeg',0.82);
      document.getElementById('attachPreview').innerHTML='<div class="relative inline-block"><img src="'+pendingImage+'" class="h-16 w-16 object-cover rounded-lg border border-gray-100"/><button onclick="clearImg()" class="absolute -top-1 -right-1 bg-gray-800 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center font-bold">x</button></div>';
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}
function clearImg() { pendingImage=null; document.getElementById('attachPreview').innerHTML=''; }
document.addEventListener('paste', e => { const items=e.clipboardData&&e.clipboardData.items; if(!items)return; for(let i=0;i<items.length;i++){if(items[i].type.startsWith('image/')){resize(items[i].getAsFile());break;}} });
const az=document.getElementById('attachZone');
az.addEventListener('dragover',e=>{e.preventDefault();az.classList.add('drag-over');});
az.addEventListener('dragleave',()=>az.classList.remove('drag-over'));
az.addEventListener('drop',e=>{e.preventDefault();az.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))resize(f);});

function toggleMic() {
  const btn = document.getElementById('micBtn');
  if (micActive) {
    micActive = false;
    btn.classList.remove('mic-active');
    if (recognition) { recognition.onend=null; recognition.abort(); recognition=null; }
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice not supported here'); return; }
  const ta = document.getElementById('noteInput');
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = ev => {
    const transcript = ev.results[0][0].transcript.trim();
    const current = ta.value.trim();
    ta.value = current ? current + ' ' + transcript : transcript;
  };
  recognition.onerror = ev => {
    if (ev.error==='no-speech'||ev.error==='aborted') return;
    micActive=false; btn.classList.remove('mic-active');
  };
  recognition.onend = () => {
    if (micActive) recognition.start();
    else btn.classList.remove('mic-active');
  };
  micActive = true;
  btn.classList.add('mic-active');
  recognition.start();
}

function exportData(){const b=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='braindump-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(){document.getElementById('importInput').click();}
function handleImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const imp=JSON.parse(e.target.result);const ids=new Set(entries.map(x=>x.id));const nov=imp.filter(x=>!ids.has(x.id));entries=[...entries,...nov];persist();renderEntries();toast('Imported '+nov.length+' new entries');}catch(e){toast('Invalid file');}};r.readAsText(f);ev.target.value='';}

document.getElementById('noteInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();saveEntry();}});
document.getElementById('entriesFeed').addEventListener('click',e=>{const span=e.target.closest('.tag');if(span&&span.dataset.tag)filterByTag(span.dataset.tag);});

function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('active');}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+' \u2022 '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.style.opacity='1',10);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),200);},2500);}

renderEntries();

</script>
